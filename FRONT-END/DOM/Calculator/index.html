<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="scripts.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Itim&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Rubik:ital,wght@0,300..900;1,300..900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>
      <form id="calculator-container">
        <header id="result-container">
          <input type="text" name="result-input" id="result-input" />
        </header>
        <section id="buttons-container">
          <div id="upperside">
            <div id="numbers">
              <button type="button" class="number" id="1">1</button>
              <button type="button" class="number" id="2">2</button>
              <button type="button" class="number" id="3">3</button>
              <button type="button" class="number" id="4">4</button>
              <button type="button" class="number" id="5">5</button>
              <button type="button" class="number" id="6">6</button>
              <button type="button" class="number" id="7">7</button>
              <button type="button" class="number" id="8">8</button>
              <button type="button" class="number" id="9">9</button>
            </div>
            <div id="operations">
              <button type="button" class="operations" id="divide-button">
                ÷
              </button>
              <button type="button" class="operations" id="multiply-button">
                x
              </button>
              <button type="button" class="operations" id="minus-button">
                -
              </button>
              <button type="button" class="operations" id="plus-button">
                +
              </button>
            </div>
          </div>
          <div id="lowerside">
            <button type="button" class="number" id="0">0</button>
            <button type="submit" class="operations" id="equal-button">
              =
            </button>
          </div>
        </section>
      </form>
    </main>
  </body>
</html>
