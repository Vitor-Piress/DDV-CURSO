<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jogo da Forca</title>
    <script src="Script.js" defer></script>
    <link rel="stylesheet" href="Styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Inria+Sans:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Itim&family=Jaro:opsz@6..72&family=Kirang+Haerang&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Rubik:ital,wght@0,300..900;1,300..900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="modal-container" class="hidden">
      <div id="pop-up-container">
        <button id="close-button">
          <img src="Assets/Close.svg" alt="close-button" />
        </button>
        <p>Reiniciar</p>
        <button id="restart-button">
          <img src="Assets/Restart.svg" alt="restart-button" />
        </button>
      </div>
      <div id="background"></div>
    </div>
    <header>
      <div></div>
      <h1>Frutas</h1>
      <img src="Assets/Pause.svg" alt="pause-icon" id="pause-button" />
    </header>
    <main>
      <section id="game-container">
        <div id="stick-container">
          <img
            src="Assets/Structure.svg"
            alt="structure-img"
            id="structure-img"
          />
          <img src="Assets/01.svg" alt="stickman-img" id="stickman-img" />
        </div>
        <div id="word-container"></div>
      </section>
      <section id="keyboard-container">
        <div id="line-01">
          <button class="keyboard-letter" value="A">A</button>
          <button class="keyboard-letter" value="B">B</button>
          <button class="keyboard-letter" value="C">C</button>
          <button class="keyboard-letter" value="D">D</button>
          <button class="keyboard-letter" value="E">E</button>
          <button class="keyboard-letter" value="F">F</button>
          <button class="keyboard-letter" value="G">G</button>
          <button class="keyboard-letter" value="H">H</button>
          <button class="keyboard-letter" value="I">I</button>
          <button class="keyboard-letter" value="J">J</button>
          <button class="keyboard-letter" value="K">K</button>
          <button class="keyboard-letter" value="L">L</button>
          <button class="keyboard-letter" value="M">M</button>
          <button class="keyboard-letter" value="N">N</button>
          <button class="keyboard-letter" value="O">O</button>
        </div>
        <div id="line-02">
          <button class="keyboard-letter" value="P">P</button>
          <button class="keyboard-letter" value="Q">Q</button>
          <button class="keyboard-letter" value="R">R</button>
          <button class="keyboard-letter" value="S">S</button>
          <button class="keyboard-letter" value="T">T</button>
          <button class="keyboard-letter" value="U">U</button>
          <button class="keyboard-letter" value="V">V</button>
          <button class="keyboard-letter" value="W">W</button>
          <button class="keyboard-letter" value="X">X</button>
          <button class="keyboard-letter" value="Y">Y</button>
          <button class="keyboard-letter" value="Z">Z</button>
        </div>
      </section>
    </main>
  </body>
</html>
