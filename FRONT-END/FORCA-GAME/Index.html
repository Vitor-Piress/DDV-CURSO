<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jogo da Forca</title>
    <script src="Script.js" defer></script>
    <link rel="stylesheet" href="Styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Inria+Sans:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Itim&family=Jaro:opsz@6..72&family=Kirang+Haerang&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Rubik:ital,wght@0,300..900;1,300..900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <div></div>
      <h1>Frutas</h1>
      <img src="Assets/Pause.svg" alt="pause-icon" />
    </header>
    <main>
      <section id="game-container">
        <div id="stick-container">
          <img src="Assets/Structure.svg" alt="structure-img" />
        </div>
        <div id="word-container">
          <div class="letter-container"><p class="letter">A</p></div>
          <div class="letter-container"><p class="letter">A</p></div>
          <div class="letter-container"><p class="letter">A</p></div>
          <div class="letter-container"><p class="letter">A</p></div>
          <div class="letter-container"><p class="letter">A</p></div>
          <div class="letter-container"><p class="letter">A</p></div>
          <div class="letter-container"><p class="letter">A</p></div>
        </div>
      </section>
      <section id="keyboard-container">
        <div id="line-01">
          <p class="keyboard-letter">A</p>
          <p class="keyboard-letter">B</p>
          <p class="keyboard-letter">C</p>
          <p class="keyboard-letter">D</p>
          <p class="keyboard-letter">E</p>
          <p class="keyboard-letter">F</p>
          <p class="keyboard-letter">G</p>
          <p class="keyboard-letter">H</p>
          <p class="keyboard-letter">I</p>
          <p class="keyboard-letter">J</p>
          <p class="keyboard-letter">K</p>
          <p class="keyboard-letter">L</p>
          <p class="keyboard-letter">M</p>
          <p class="keyboard-letter">N</p>
          <p class="keyboard-letter">O</p>
        </div>
        <div id="line-02">
          <p class="keyboard-letter">A</p>
          <p class="keyboard-letter">B</p>
          <p class="keyboard-letter">C</p>
          <p class="keyboard-letter">D</p>
          <p class="keyboard-letter">E</p>
          <p class="keyboard-letter">F</p>
          <p class="keyboard-letter">G</p>
          <p class="keyboard-letter">H</p>
          <p class="keyboard-letter">I</p>
          <p class="keyboard-letter">J</p>
          <p class="keyboard-letter">K</p>
          <p class="keyboard-letter">L</p>
        </div>
      </section>
    </main>
  </body>
</html>
