<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ViaCEP API</title>
    <script src="Scripts.js" defer></script>
    <link rel="stylesheet" href="Styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Inria+Sans:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Itim&family=Kirang+Haerang&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Rubik:ital,wght@0,300..900;1,300..900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <form>
      <header id="form-header">
        <img src="Assets/sign.png" alt="address-icon" />
        <h1>Preencha com seu endereço</h1>
      </header>
      <section id="input-section">
        <input type="text" id="cep-input" placeholder="CEP" />
        <input type="text" id="rua-input" placeholder="Rua" />
        <input type="text" id="bairro-input" placeholder="Bairro" />
        <input type="number" id="numero-input" placeholder="Número" />
        <input type="text" id="complemento-input" placeholder="Complemento" />
        <input type="text" id="cidade-input" placeholder="Cidade" />
        <input type="text" id="estado-input" placeholder="Estado" />
      </section>
      <button type="submit" id="submit-button">Prosseguir</button>
    </form>
  </body>
</html>
